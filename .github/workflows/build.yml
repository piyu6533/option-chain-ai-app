name: Build APK

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Install Python
        run: |
          sudo apt update
          sudo apt install -y python3-pip

      - name: Install Buildozer and Dependencies
        run: |
          sudo apt update
          sudo apt install -y git zip unzip openjdk-17-jdk python3-pip autoconf libtool pkg-config zlib1g-dev libncurses5-dev libncursesw5-dev cmake libffi-dev libssl-dev
          # મેં ઉપરની લાઈનમાંથી libtinfo5 કાઢી નાખ્યું છે જે એરર આપતું હતું.
        run: |
          # SDK Manager દ્વારા લાઈસન્સ એક્સેપ્ટ કરવા માટે
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses || true

      - name: Build Android APK
        run: |
          buildozer android debug
