name: Build APK
on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Dependencies
        run: |
          sudo apt update
          # બધી જ જરૂરી લાઈબ્રેરીઓ એકસાથે
          sudo apt install -y git zip unzip openjdk-17-jdk autoconf libtool libtool-bin m4 pkg-config zlib1g-dev libncurses5-dev libncursesw5-dev cmake libffi-dev libssl-dev
          python3 -m pip install --upgrade pip
          pip install "cython<3.0" buildozer 

      - name: Clean and Build
        run: |
          # જો જૂનું કોઈ બિલ્ડ પડ્યું હોય તો તેને સાફ કરવા માટે
          buildozer android clean
          # લાઈસન્સ એક્સેપ્ટ કરીને બિલ્ડ શરૂ કરો
          yes | buildozer -v android debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: TradingApp-APK
          path: bin/*.apk
