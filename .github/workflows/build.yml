name: Build APK
on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10' # વધારે સ્ટેબલ વર્ઝન

      - name: Install Dependencies
        run: |
          sudo apt update
          # બધી જ જરૂરી સિસ્ટમ લાઈબ્રેરીઓ
          sudo apt install -y git zip unzip openjdk-17-jdk autoconf libtool libtool-bin m4 pkg-config zlib1g-dev libncurses5-dev libncursesw5-dev cmake libffi-dev libssl-dev build-essential
          
          # આ લાઈન ખાસ ઉમેરવી - લિબટૂલને બરાબર સેટ કરવા માટે
          sudo apt install -y automake
          
          python3 -m pip install --upgrade pip
          pip install "cython<3.0" buildozer python-for-android
          
      - name: Build Android APK
        run: |
          # સીધું જ બિલ્ડ શરૂ કરો, ક્લીન કરવાની જરૂર નથી જો પહેલી વાર હોય
          yes | buildozer -v android debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: TradingApp-APK
          path: bin/*.apk
